<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zip-it | High-Performance Downloader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .section {
            margin-bottom: 2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        input[type="text"], textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 1rem;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
            margin-bottom: 1rem;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background-color: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        button.secondary:hover {
            background-color: rgba(99, 102, 241, 0.1);
        }

        #status {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.5);
            font-size: 0.95rem;
            border-left: 4px solid var(--primary);
            min-height: 80px;
            white-space: pre-wrap;
            transition: all 0.3s;
        }

        #status.active {
            border-left-color: var(--accent);
        }

        #status.error {
            border-left-color: var(--error);
            color: #fca5a5;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 2rem 0;
            position: relative;
        }

        .divider::after {
            content: "OR";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            padding: 0 1rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 700;
        }

        small {
            display: block;
            margin-top: 0.5rem;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* Dashboard Styles */
        #dashboard {
            margin-top: 2rem;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.5rem;
            display: none;
            backdrop-filter: blur(10px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.4);
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .progress-container {
            margin-bottom: 1.5rem;
        }

        .progress-bar-bg {
            height: 8px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            width: 0%;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .controls-row {
            display: flex;
            gap: 1rem;
        }

        .controls-row button {
            flex: 1;
            padding: 0.75rem;
            font-size: 0.9rem;
        }

        #pause-resume-btn.paused {
            background-color: var(--accent);
        }

        #direct-zip-btn {
            background-color: var(--error);
            display: none;
        }

        #finalize-zip-btn {
            background-color: var(--accent);
            display: none;
        }

        #active-files-list {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            max-height: 60px;
            overflow-y: auto;
        }

        .active-file-item {
            display: flex;
            justify-content: space-between;
            padding: 0.25rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        #resume-section {
            display: none;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid var(--primary);
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            text-align: center;
        }

        #resume-section h3 {
            margin-bottom: 1rem;
            color: var(--text);
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Zip-it Downloader</h1>
            <p class="subtitle">High-performance batch downloading service</p>
        </header>

        <div id="resume-section">
            <h3>Previous Session Found</h3>
            <p id="resume-info" style="margin-bottom: 1rem; color: var(--text-muted); font-size: 0.9rem;">
                There are files pending from your last visit.
            </p>
            <button id="resume-session-btn" style="width: 100%; background-color: var(--accent);">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                Continue Session & Select Folder
            </button>
        </div>

        <div class="section">
            <label for="api-url">Option 1: Fetch from API Endpoint</label>
            <input type="text" id="api-url" placeholder="https://api.yoursite.com/v1/downloads/session-123" />
            <button id="fetch-api" style="width: 100%; margin-bottom: 0.5rem;">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Fetch & Download (Native)
            </button>
            <button id="fetch-zip" style="width: 100%; border-color: var(--accent); color: var(--accent); background: transparent; border: 1px solid var(--accent);">
                Fetch & ZIP (On-the-Fly)
            </button>
        </div>

        <div class="divider"></div>

        <div class="section">
            <label for="url-input">Option 2: Paste Direct URLs</label>
            <textarea id="url-input" rows="4" placeholder="https://example.com/file1.mp4, https://example.com/file2.zip"></textarea>
            <button id="start-download" class="secondary" style="width: 100%; margin-bottom: 0.5rem;">
                Start Direct Download (Resumable)
            </button>
            <button id="start-fly-zip" class="secondary" style="width: 100%; border-color: var(--accent); color: var(--accent);">
                Download ZIP (On-the-Fly)
            </button>
        </div>

        <div id="status">Ready to download. Status updates will appear here...</div>

        <div id="dashboard">
            <div class="stats-grid">
                <div class="stat-card">
                    <div id="stat-files" class="stat-value">0 / 0</div>
                    <div class="stat-label">Files Processed</div>
                </div>
                <div class="stat-card">
                    <div id="stat-speed" class="stat-value">0 KB/s</div>
                    <div class="stat-label">Est. Speed</div>
                </div>
            </div>

            <div class="progress-container">
                <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                    <span>Overall Progress</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-fill" class="progress-bar-fill"></div>
                </div>
            </div>

            <div class="controls-row">
                <button id="pause-resume-btn">
                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M6 4h4v16H6zm8 0h4v16h-4z"/></svg>
                    Pause
                </button>
                <button id="finalize-zip-btn">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Finalize ZIP
                </button>
                <button id="direct-zip-btn">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    Download Direct (Zero Space)
                </button>
                <button id="reset-btn" class="secondary">Reset</button>
            </div>

            <div id="active-files-list"></div>
        </div>
    </div>
    <script type="module" src="/main.ts"></script>
</body>
</html>
